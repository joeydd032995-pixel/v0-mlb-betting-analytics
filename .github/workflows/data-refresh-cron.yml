name: Data Refresh Agent (weekly)

# Weekly Statcast pull into pitcher_statcast / batter_statcast tables.
# Pulls the rolling 14-day window so the cache stays fresh without
# repulling the whole season.
#
# Monday 10:00 UTC (one hour after the optimization cron so the latter can
# train against any new data the agent committed).
on:
  schedule:
    - cron: "0 10 * * MON"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Rolling window in days (default 14)"
        required: false
        default: ""
      season_start:
        description: "Aggregate-window start (YYYY-MM-DD) for pitch-mix/zone; blank → Mar 1"
        required: false
        default: ""
      dry_run:
        description: "Print summary; skip DB writes"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL:           ${{ secrets.DATABASE_URL }}
      AGENT_LOOKBACK_DAYS:    ${{ inputs.lookback_days || '14' }}
      AGENT_SEASON_START:     ${{ inputs.season_start || '' }}
      AGENT_DRY_RUN:          ${{ inputs.dry_run && '1' || '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install Node deps
        run: npm ci --ignore-scripts
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/data/requirements.txt
      - name: Refresh Statcast
        run: npx tsx scripts/agents/data_backfill_agent.ts
