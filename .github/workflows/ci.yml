name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  quality:
    name: Type-check, Lint & Build
    runs-on: ubuntu-latest
    # Expose secrets as env vars so they can be checked in step-level `if` conditions.
    # (The `secrets` context is not available in step-level `if`; `env` context is.)
    env:
      HAS_BUILD_SECRETS: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY != '' && secrets.CLERK_SECRET_KEY != '' && secrets.DATABASE_URL != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      # The full Next.js build (with Clerk + DB secrets) runs on every push via
      # Vercel's preview deployment — see the Vercel bot comment on this PR.
      # Add NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY / CLERK_SECRET_KEY / DATABASE_URL
      # as repo secrets to also gate the build here in CI.
      - name: Build
        if: env.HAS_BUILD_SECRETS == 'true'
        run: npx next build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  unit-tests:
    name: Unit tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Write coverage summary to step summary
        if: always()
        run: |
          echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat coverage/coverage-summary.json 2>/dev/null \
            | node -e "
              const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
              const t = d.total;
              console.log('| | Lines | Functions | Branches |');
              console.log('|---|---|---|---|');
              console.log(\`| **Total** | \${t.lines.pct}% | \${t.functions.pct}% | \${t.branches.pct}% |\`);
            " >> $GITHUB_STEP_SUMMARY \
            || echo "Coverage JSON not found" >> $GITHUB_STEP_SUMMARY

  deepnrfi-features:
    name: DeepNRFI builder feature invariants
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/deepnrfi/requirements.txt

      - name: Install DeepNRFI deps
        run: pip install -r scripts/deepnrfi/requirements.txt

      - name: Verify Tier 1-3 feature aggregators
        run: python scripts/deepnrfi/verify_builder_features.py
        working-directory: ${{ github.workspace }}
